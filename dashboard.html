<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin="" />
  <link
    rel="stylesheet"
    as="style"
    onload="this.rel='stylesheet'"
    href="https://fonts.googleapis.com/css2?display=swap&amp;family=Lexend:wght@400;500;700;900&amp;family=Noto+Sans:wght@400;500;700;900"
  />
  <title>EduVance - Dashboard</title>
  <link rel="icon" type="image/x-icon" href="data:image/x-icon;base64," />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <!-- Include Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50">
  <div class="relative flex min-h-screen flex-col bg-white overflow-x-hidden" style="font-family: Lexend, 'Noto Sans', sans-serif;">
    <!-- Header -->
    <header class="flex items-center justify-between border-b border-gray-200 px-6 py-4">
      <div class="flex items-center gap-8">
        <div class="flex items-center gap-4 text-[#111517]">
          <div class="h-8 w-8">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M44 11.2727C44 14.0109 39.8386 16.3957 33.69 17.6364C39.8386 18.877 44 21.2618 44 24C44 26.7382 39.8386 29.123 33.69 30.3636C39.8386 31.6043 44 33.9891 44 36.7273C44 40.7439 35.0457 44 24 44C12.9543 44 4 40.7439 4 36.7273C4 33.9891 8.16144 31.6043 14.31 30.3636C8.16144 29.123 4 26.7382 4 24C4 21.2618 8.16144 18.877 14.31 17.6364C8.16144 16.3957 4 14.0109 4 11.2727Z" fill="currentColor"></path>
            </svg>
          </div>
          <h2 class="text-lg font-bold">EduVance</h2>
        </div>
        <label class="flex items-center w-64">
          <div class="flex items-center justify-center bg-[#f0f3f4] rounded-l-xl h-10 px-4" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
              <path d="M229.66,218.34l-50.07-50.06a88.11,88.11,0,1,0-11.31,11.31l50.06,50.07a8,8,0,0,0,11.32-11.32ZM40,112a72,72,0,1,1,72,72A72.08,72.08,0,0,1,40,112Z"></path>
            </svg>
          </div>
          <input type="text" placeholder="Search" class="flex-1 h-10 px-4 rounded-r-xl bg-[#f0f3f4] text-[#111517] focus:outline-none focus:ring-2 focus:ring-blue-500" aria-label="Search" />
        </label>
      </div>
      <div class="flex items-center gap-4">
        <select id="languageSelect" class="p-2 border rounded-lg">
          <option value="en">English</option>
          <option value="kn">ಕನ್ನಡ</option>
        </select>
        <button class="flex items-center justify-center h-10 w-10 bg-[#f0f3f4] rounded-full text-[#111517] hover:bg-[#e0e7eb]" aria-label="Notifications">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
            <path d="M221.8,175.94C216.25,166.38,208,139.33,208,104a80,80,0,1,0-160,0c0,35.34-8.26,62.38-13.81,71.94A16,16,0,0,0,48,200H88.81a40,40,0,0,0,78.38,0H208a16,16,0,0,0,13.8-24.06ZM128,216a24,24,0,0,1-22.62-16h45.24A24,24,0,0,1,128,216ZM48,184c7.7-13.24,16-43.92,16-80a64,64,0,1,1,128,0c0,36.05,8.28,66.73,16,80Z"></path>
          </svg>
        </button>
        <button class="flex items-center justify-center h-10 w-10 bg-[#f0f3f4] rounded-full text-[#111517] hover:bg-[#e0e7eb]" aria-label="Chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
            <path d="M221.8,175.94a8,8,0,0,1,0,11.32l-82.05,82a56,56,0,0,1-79.2-79.21L147.67,35.73a40,40,0,1,1,56.61,56.55L105,193A24,24,0,1,1,71,159L154.3,74.38A8,8,0,1,1,165.7,85.6L82.39,170.31a8,8,0,1,0,11.27,11.36L192.93,81A24,24,0,1,0,159,47L59.76,147.68a40,40,0,1,0,56.53,56.62l82.06-82A8,8,0,0,1,221.8,175.94Z"></path>
          </svg>
        </button>
        <div class="h-10 w-10 bg-center bg-no-repeat bg-cover rounded-full" style='background-image: url("https://cdn.usegalileo.ai/stability/56422f9a-cd60-425d-b086-62a619d3102a.png");' aria-label="User Profile" role="img"></div>
        <button id="logoutButton" class="flex items-center justify-center h-10 w-10 bg-[#f0f3f4] rounded-full text-[#111517] hover:bg-[#e0e7eb]" aria-label="Logout">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
            <path d="M224,104a8,8,0,0,1-8,8H136a8,8,0,0,1,0-16h80A8,8,0,0,1,224,104ZM224,168a8,8,0,0,1-8,8H136a8,8,0,0,1,0-16h80A8,8,0,0,1,224,168ZM184,136a8,8,0,0,1-8,8H136a8,8,0,0,1,0-16h40A8,8,0,0,1,184,136ZM96,136a8,8,0,0,1-8,8H56a8,8,0,0,1,0-16h32A8,8,0,0,1,96,136ZM56,168a8,8,0,0,1-8,8H32a8,8,0,0,1,0-16H48A8,8,0,0,1,56,168ZM224,232H32a8,8,0,0,1,0-16H224a8,8,0,0,1,0,16ZM32,112a8,8,0,0,1-8-8V32a8,8,0,0,1,8-8H224a8,8,0,0,1,0,16H32V104A8,8,0,0,1,32,112Z"></path>
          </svg>
        </button>
      </div>
    </header>
    
    <!-- Navigation Bar -->
    <nav class="bg-gray-100 border-b border-gray-200">
      <div class="flex justify-between px-6 py-4">
        <ul class="flex space-x-6">
          <li>
            <a href="course.html" class="text-gray-700 hover:text-blue-600" id="coursesNav">Courses</a>
          </li>
          <li>
            <a href="assignments.html" class="text-gray-700 hover:text-blue-600" id="assignmentsNav">Assignments</a>
          </li>
          <li>
            <a href="ai_assistant.html" class="text-gray-700 hover:text-blue-600" id="aiTutorNav">AI Assistant</a>
          </li>
          <li>
            <a href="profile.html" class="text-gray-700 hover:text-blue-600" id="profileNav">Profile</a>
          </li>
          <li>
            <a href="virtual_lab.html" class="text-gray-700 hover:text-blue-600" id="virtualLabNav">Virtual lab</a>
          </li>
          
        </ul>
      </div>
    </nav>
    
    <!-- Main Content -->
    <main class="flex flex-col flex-1 p-6 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-[#111517]" id="dashboardTitle">Dashboard</h1>
        <button id="darkModeToggle" class="flex items-center justify-center h-10 w-10 bg-[#f0f3f4] rounded-full text-[#111517] hover:bg-[#e0e7eb]" aria-label="Toggle Dark Mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256">
            <path d="M128,40a88,88,0,1,0,88,88A88.1,88.1,0,0,0,128,40Zm0,160a72,72,0,1,1,72-72A72.1,72.1,0,0,1,128,200Z"></path>
          </svg>
        </button>
      </div>

      <!-- Recommended Courses -->
      <section class="mb-6">
        <h2 class="text-lg font-bold text-[#111517] mb-4" id="recommendedCoursesTitle">Recommended Courses</h2>
        <div id="recommendedCourses" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
          <!-- Course cards will be injected here by JavaScript -->
        </div>
      </section>

      <!-- User Progress -->
      <section>
        <h2 class="text-lg font-bold text-[#111517] mb-4" id="userProgressTitle">User Progress</h2>
        <canvas id="progressChart" class="w-full h-64"></canvas>
      </section>
    </main>

    <!-- AI Assistant Floating Button with Floating Message -->
    <div class="fixed bottom-6 right-6 flex items-center space-x-3 group">
      <!-- Floating Message -->
      <div class="flex items-center bg-blue-600 text-white text-sm px-4 py-2 rounded-lg shadow-lg transform translate-x-4 opacity-0 group-hover:translate-x-0 group-hover:opacity-100 transition-all duration-300">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 24 24" class="mr-2">
          <path d="M12 0C5.383 0 0 5.383 0 12c0 6.617 5.383 12 12 12s12-5.383 12-12C24 5.383 18.617 0 12 0zm0 22c-5.514 0-10-4.486-10-10S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10zm1-15h-2v6h2V7zm0 8h-2v2h2v-2z"/>
        </svg>
        <span id="needHelpText">Need Help? Ask our AI Assistant!</span>
      </div>
      <!-- AI Assistant Button -->
      <a href="ai_assistant.html" class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full shadow-lg transition-transform transform hover:scale-110" aria-label="AI Assistant">
        <!-- Modern AI Assistant Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 0C5.383 0 0 5.383 0 12c0 6.617 5.383 12 12 12s12-5.383 12-12C24 5.383 18.617 0 12 0zm0 22c-5.514 0-10-4.486-10-10S6.486 2 12 2s10 4.486 10 10-4.486 10-10 10zm1-15h-2v6h2V7zm0 8h-2v2h2v-2z"/>
        </svg>
      </a>
    </div>

    <!-- Footer -->
    <footer class="flex items-center justify-center border-t border-gray-200 py-4">
      <span class="text-sm text-gray-500" id="footerText">© 2024 EduVance. All rights reserved.</span>
    </footer>
  </div>

  <script>
    const recommendedCourses = [
      {
        title: "Introduction to Programming",
        description: "Learn the basics of programming with this comprehensive course.",
        duration: "4 weeks",
      },
      {
        title: "Data Science Fundamentals",
        description: "Explore the world of data science and machine learning.",
        duration: "6 weeks",
      },
      {
        title: "Web Development Bootcamp",
        description: "Become a full-stack web developer in this immersive course.",
        duration: "8 weeks",
      },
      {
        title: "Graphic Design Essentials",
        description: "Unleash your creativity with essential graphic design skills.",
        duration: "5 weeks",
      },
    ];

    const coursesContainer = document.getElementById("recommendedCourses");

    recommendedCourses.forEach(course => {
      const courseCard = document.createElement("div");
      courseCard.className = "p-4 border rounded-lg shadow-md bg-white flex flex-col justify-between";
      courseCard.innerHTML = `
        <div>
          <h3 class="font-bold text-lg mb-2" id="courseTitle_${course.title}">${course.title}</h3>
          <p class="text-gray-600 mb-4" id="courseDescription_${course.title}">${course.description}</p>
        </div>
        <div class="flex justify-between items-center">
          <span class="text-sm text-gray-500" id="courseDuration_${course.title}">${course.duration}</span>
          <a href="course.html?id=${encodeURIComponent(course.title)}" class="text-blue-600 hover:underline" id="viewCourse_${course.title}">View Course</a>
        </div>
      `;
      coursesContainer.appendChild(courseCard);
    });

    const ctx = document.getElementById("progressChart").getContext("2d");
    const progressChart = new Chart(ctx, {
      type: "bar",
      data: {
        labels: ["Course 1", "Course 2", "Course 3", "Course 4"],
        datasets: [{
          label: "Completion Progress (%)",
          data: [75, 50, 90, 30],
          backgroundColor: "rgba(75, 192, 192, 0.6)",
          borderColor: "rgba(75, 192, 192, 1)",
          borderWidth: 1,
        }],
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true,
            max: 100,
          },
        },
      },
    });

    // Language Dictionaries
    const languages = {
      en: {
        coursesNav: "Courses",
        assignmentsNav: "Assignments",
        aiTutorNav: "AI Assistant",
        profileNav: "Profile",
        virtualLabNav: "Virtual lab",
        dashboardTitle: "Dashboard",
        recommendedCoursesTitle: "Recommended Courses",
        userProgressTitle: "User Progress",
        needHelpText: "Need Help? Ask our AI Assistant!",
        footerText: "© 2024 EduVance. All rights reserved.",
        viewCourse: "View Course",
        duration: "Duration",
      },
      kn: {
        coursesNav: "ಕೋರ್ಸ್‌ಗಳು",
        assignmentsNav: "ಕಾರ್ಯಗಳು",
        aiTutorNav: "AI ಸಹಾಯಕ",
        profileNav: "ಪ್ರೊಫೈಲ್",
        virtualLabNav: "ವರ್ಚುವಲ್ ಲ್ಯಾಬ್",
        dashboardTitle: "ಡ್ಯಾಶ್‌ಬೋರ್ಡ್",
        recommendedCoursesTitle: "ಶಿಫಾರಸು ಮಾಡಿದ ಕೋರ್ಸ್‌ಗಳು",
        userProgressTitle: "ಬಳಕೆದಾರ ಪ್ರಗತಿ",
        needHelpText: "ಸಹಾಯ ಬೇಕೇ? ನಮ್ಮ AI ಸಹಾಯಕನಿಗೆ ಕೇಳಿ!",
        footerText: "© 2024 EduVance. ಎಲ್ಲ ಹಕ್ಕುಗಳನ್ನು ಕಾಯ್ದಿರಿಸಲಾಗಿದೆ.",
        viewCourse: "ಕೋರ್ಸ್ ವೀಕ್ಷಿಸಿ",
        duration: "ಅವಧಿ",
      },
    };

    let currentLanguage = "en";

    function updateLanguage(lang) {
      const elements = {
        coursesNav: document.getElementById("coursesNav"),
        assignmentsNav: document.getElementById("assignmentsNav"),
        aiTutorNav: document.getElementById("aiTutorNav"),
        profileNav: document.getElementById("profileNav"),
        virtualLabNav: document.getElementById("virtualLabNav"),
        dashboardTitle: document.getElementById("dashboardTitle"),
        recommendedCoursesTitle: document.getElementById("recommendedCoursesTitle"),
        userProgressTitle: document.getElementById("userProgressTitle"),
        needHelpText: document.getElementById("needHelpText"),
        footerText: document.getElementById("footerText"),
      };

      for (const key in elements) {
        if (elements[key]) {
          elements[key].textContent = languages[lang][key];
        }
      }

      recommendedCourses.forEach(course => {
        document.getElementById(`courseTitle_${course.title}`).textContent = course.title;
        document.getElementById(`courseDescription_${course.title}`).textContent = course.description;
        document.getElementById(`courseDuration_${course.title}`).textContent = `${languages[lang].duration}: ${course.duration}`;
        document.getElementById(`viewCourse_${course.title}`).textContent = languages[lang].viewCourse;
      });

      currentLanguage = lang;
    }

    document.getElementById("languageSelect").addEventListener("change", (event) => {
      const newLang = event.target.value;
      updateLanguage(newLang);
    });

    // Logout Button Event
    document.getElementById('logoutButton').addEventListener('click', () => {
      alert('Logged out successfully!');
      // Perform actual logout logic here (e.g., redirect to login page)
      window.location.href = 'login.html';
    });
  </script>

</body>
</html>
